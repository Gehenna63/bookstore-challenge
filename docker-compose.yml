services:
  bookstore_api:
    build: .
    container_name: bookstore_api
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      bookstore_db:
        condition: service_healthy
    env_file:
      - .env

  bookstore_db:
    image: mysql:8.0
    container_name: bookstore_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: bookstore
      MYSQL_USER: bookstore
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - bookstore_data:/var/lib/mysql

volumes:
  bookstore_data:
